name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fixture suite
        run: node test/run-tests.mjs
      - name: Real-PTY smoke test
        run: node test/tty-smoke.mjs
